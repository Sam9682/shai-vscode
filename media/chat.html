<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shai Chat</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            padding: 10px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #messages { 
            height: 300px; 
            border: 1px solid #ccc; 
            padding: 10px; 
            overflow-y: auto; 
            margin-bottom: 10px; 
            flex-grow: 1;
        }
        #input-container {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: flex-end; /* Align items to bottom */
        }
        #input { 
            flex-grow: 1; 
            padding: 5px; 
            resize: vertical; /* Allow vertical resizing only */
            min-height: 50px;
            box-sizing: border-box; /* Include padding in height calculation */
            height: 30px; /* Fixed height for initial state */
        }
        #send { 
            padding: 5px 10px; 
            white-space: nowrap;
            min-width: 60px;
            height: 30px;
            flex-shrink: 0; /* Prevent shrinking */
            flex-grow: 0; /* Prevent growing */
        }
        #clear { 
            padding: 5px 10px; 
            white-space: nowrap;
            min-width: 60px;
            height: 30px;
            flex-shrink: 0; /* Prevent shrinking */
            flex-grow: 0; /* Prevent growing */
        }
    </style>
</head>
<body>
    <div id="messages"></div>
    <div id="input-container">
        <div style="flex-grow: 1; display: flex; flex-direction: column;">
            <textarea id="input" placeholder="Type your message..."></textarea>
        </div>
        <button id="send">Send</button>
        <button id="clear">Clear</button>
    </div>
    
    <script>
        const vscode = acquireVsCodeApi();
        const messages = document.getElementById('messages');
        const input = document.getElementById('input');
        const send = document.getElementById('send');
        const clear = document.getElementById('clear');
        
        // Auto-resize textarea based on content
        input.addEventListener('keydown', function(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        send.click();
    }
});

input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px'; // Limit max height
        });
        
        send.addEventListener('click', () => {
            const text = input.value.trim();
            if (text) {
                vscode.postMessage({ command: 'sendMessage', text });
                input.value = '';
                input.style.height = 'auto'; // Reset height after sending
            }
        });
        
        clear.addEventListener('click', () => {
            messages.innerHTML = '';
            vscode.postMessage({ command: 'clearChat' });
        });
        
        function formatMessage(text) {
            // Convert newlines to <br> and handle basic markdown
            let formatted = text.replace(/\n/g, '<br>');
            
            // Handle code blocks (```code```)
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre style="background: #f4f4f4; padding: 8px; border-radius: 4px; overflow-x: auto;"><code>$1</code></pre>');
            
            // Handle inline code (`code`)
            formatted = formatted.replace(/`([^`]+)`/g, '<code style="background: #f4f4f4; padding: 2px 4px; border-radius: 3px;">$1</code>');
            
            // Handle bold text (**bold**)
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            
            // Handle italic text (*italic*)
            formatted = formatted.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Handle lists
            formatted = formatted.replace(/^\s*[-*+]\s+(.*)$/gm, '<li>$1</li>');
            formatted = formatted.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            
            // Handle headers (# Header)
            formatted = formatted.replace(/^###\s+(.*)$/gm, '<h3 style="margin-top: 16px; margin-bottom: 8px;">$1</h3>');
            formatted = formatted.replace(/^##\s+(.*)$/gm, '<h2 style="margin-top: 20px; margin-bottom: 10px;">$1</h2>');
            formatted = formatted.replace(/^#\s+(.*)$/gm, '<h1 style="margin-top: 24px; margin-bottom: 12px;">$1</h1>');
            
            return formatted;
        }
        
        window.addEventListener('message', event => {
            const message = event.data;
            if (message.command === 'receiveMessage') {
                const div = document.createElement('div');
                div.innerHTML = formatMessage(message.text);
                messages.appendChild(div);
                messages.scrollTop = messages.scrollHeight;
            }
        });
    </script>
</body>
</html>
